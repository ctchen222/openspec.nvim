schema: spec-driven

context: |
  openspec.nvim is a Neovim plugin written in Lua.
  It provides a reading and navigation layer for OpenSpec artifacts while keeping markdown files as the source of truth.
  The v1 scope is task progress for openspec/changes/*/tasks.md with no external Neovim plugin dependencies.
  Prefer small, testable modules and keep public setup options stable.
  Use Conventional Commits for every git commit.
  Keep implementation branches aligned to the active OpenSpec change with the format <type>/<YYMMDD>-<context>.
  When an OpenSpec change is complete and relevant verification passes, archive the change before opening or updating a PR to main.

rules:
  proposal:
    - State whether a change affects the public setup API, commands, or default keymaps.
    - Keep non-goals explicit so the plugin does not grow into an editor distribution.
  design:
    - Describe module boundaries and data flow between discovery, parsing, UI, and integrations.
    - Prefer dependency-free Neovim Lua unless a dependency is required for a specific integration.
  tasks:
    - Group implementation, docs, and verification separately.
    - Mark completed tasks only after the corresponding code or artifact exists.
    - When all tasks for a change are complete and validation evidence is acceptable, archive the change under openspec/changes/archive before opening or updating a PR to main.
  workflow:
    - Treat openspec/specs and openspec/changes as the source of truth for PR scope and completion status.
    - Keep the git branch name aligned with the active change and use Conventional Commits for commit messages.
