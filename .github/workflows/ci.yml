name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Headless Neovim tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Run tests
        run: make test

  openspec:
    name: OpenSpec validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec

      - name: Validate OpenSpec artifacts
        run: make validate
